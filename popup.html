<!DOCTYPE html>
<html lang="vi">

<head>
  <meta charset="UTF-8">
  <link rel="stylesheet" href="popup.css">
</head>

<body>
  <div class="popup">
    <div class="header">
      <span class="logo">
        <svg xmlns="http://www.w3.org/2000/svg" width="22" height="22" viewBox="0 0 128 128">
          <defs>
            <linearGradient id="popgrad" x1="0%" y1="0%" x2="100%" y2="100%">
              <stop offset="0%" stop-color="#a855f7" />
              <stop offset="100%" stop-color="#0ea5e9" />
            </linearGradient>
          </defs>
          <path
            d="M64 14 C36.4 14 14 36.4 14 64 C14 74.3 17.1 84 22.4 92 L28.8 85.6 C25.1 79.2 23 71.8 23 64 C23 41.3 41.3 23 64 23 C68.8 23 73.4 23.8 77.7 25.4 L68 34 L96 38 L94 10 L84.4 18.6 C78.1 15.6 71.2 14 64 14 Z"
            fill="url(#popgrad)" />
          <path
            d="M104.6 36 L98.2 42.4 C101.9 48.8 104 56.2 104 64 C104 86.7 85.7 105 64 105 C59.2 105 54.6 104.2 50.3 102.6 L60 94 L32 90 L34 118 L43.6 109.4 C49.9 112.4 56.8 114 64 114 C91.6 114 114 91.6 114 64 C114 53.7 110.9 44 105.6 36 Z"
            fill="url(#popgrad)" />
          <path d="M64 36 C64 54 54 64 36 64 C54 64 64 74 64 92 C64 74 74 64 92 64 C74 64 64 54 64 36 Z"
            fill="#ffffff" />
        </svg>
      </span>
      <h1>Social Content Repurposer</h1>
    </div>
    <p class="author">by Lê Ẩn</p>

    <!-- Tabs -->
    <div class="tabs">
      <button class="tab active" data-tab="settings">Cài đặt</button>
      <button class="tab" data-tab="history">Lịch sử</button>
    </div>

    <!-- Settings Tab -->
    <div class="tab-content active" id="tab-settings">
      <div class="field">
        <label for="provider">Dịch vụ AI</label>
        <select id="provider">
          <option value="groq">Groq — Llama 3.3 70B (khuyên dùng)</option>
          <option value="gemini">Google Gemini 2.0 Flash</option>
        </select>
      </div>

      <div class="field">
        <label for="apiKey">API Key</label>
        <div class="input-group">
          <input type="password" id="apiKey" placeholder="Nhập API key">
          <button type="button" id="toggleKey" class="icon-btn" title="Hiện/ẩn">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z" />
              <circle cx="12" cy="12" r="3" />
            </svg>
          </button>
        </div>
      </div>

      <div class="field">
        <label for="outputLang">Ngôn ngữ tóm tắt</label>
        <select id="outputLang">
          <option value="auto">Tự động (Việt nếu bài tiếng Anh)</option>
          <option value="vi">Luôn tiếng Việt</option>
          <option value="en">Luôn tiếng Anh</option>
        </select>
      </div>

      <div class="field">
        <label for="minLength">Độ dài tối thiểu (ký tự)</label>
        <input type="number" id="minLength" value="400" min="100" max="5000" step="100">
      </div>

      <div class="field">
        <label for="customPrompt">Tùy chỉnh Prompt cho Status (để trống = mặc định)</label>
        <textarea id="customPrompt" rows="2" placeholder="VD: Đóng vai chuyên gia..."></textarea>
      </div>

      <div class="field">
        <label for="customAffPrompt">Tùy chỉnh Prompt cho Affiliate</label>
        <textarea id="customAffPrompt" rows="2" placeholder="VD: Viết review 1 câu..."></textarea>
      </div>

      <button id="saveBtn">Lưu cài đặt</button>
      <button id="testBtn" class="test-btn">Test kết nối</button>
      <div id="status" class="status"></div>

      <div style="font-size: 13px; color: #64748b; margin-top: 12px; background: #f8fafc; padding: 10px; border-radius: 8px;">
        🖱️ <b>Chuột phải:</b> Bôi đen chữ & chọn tính năng<br>
        ⌨️ <b>Phím tắt:</b><br>
        - Status MXH: Ctrl/Cmd + Shift + S<br>
        - Affiliate: Ctrl/Cmd + Shift + A<br>
        <i>(Đổi phím: chrome://extensions/shortcuts)</i>
      </div>

      <div class="links">
        <a href="https://console.groq.com/keys" target="_blank" id="linkGroq">Lấy Groq API Key miễn phí</a>
        <a href="https://aistudio.google.com/apikey" target="_blank" id="linkGemini" style="display:none">Lấy Gemini API
          Key miễn phí</a>
      </div>
    </div>

    <!-- History Tab -->
    <div class="tab-content" id="tab-history">
      <div id="historyList" class="history-list"></div>
      <div id="historyDetail" class="history-detail" style="display:none">
        <button id="historyBack" class="test-btn" style="margin-bottom:6px">← Quay lại</button>
        <div class="history-detail-date" id="historyDetailDate"></div>
        <div class="history-detail-body" id="historyDetailBody"></div>
        <button id="historyDetailCopy" class="test-btn" style="margin-top:6px">Copy</button>
      </div>
      <div id="historyActions">
        <button id="exportBtn" class="test-btn">Export JSON</button>
        <button id="exportMdBtn" class="test-btn" style="margin-top:4px">Export Markdown</button>
        <button id="clearBtn" class="test-btn" style="margin-top:4px;color:#ff6b6b">Xóa lịch sử</button>
      </div>
    </div>
  </div>
  <script src="popup.js"></script>
</body>

</html>
