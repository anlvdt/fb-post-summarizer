<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <div class="popup">
    <div class="header">
      <span class="logo">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#a855f7" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/>
          <polyline points="14 2 14 8 20 8"/>
          <line x1="16" y1="13" x2="8" y2="13"/>
          <line x1="16" y1="17" x2="8" y2="17"/>
        </svg>
      </span>
      <h1>FB Post Summarizer</h1>
    </div>
    <p class="desc">Tóm tắt bài viết dài trên Facebook bằng AI miễn phí</p>

    <div class="field">
      <label for="provider">Dịch vụ AI</label>
      <select id="provider">
        <option value="groq">Groq — Llama 3.3 70B (khuyên dùng)</option>
        <option value="gemini">Google Gemini 2.0 Flash</option>
      </select>
    </div>

    <div class="field">
      <label for="apiKey">API Key</label>
      <input type="password" id="apiKey" placeholder="Nhập API key">
    </div>

    <div class="field">
      <label for="minLength">Độ dài tối thiểu (ký tự)</label>
      <input type="number" id="minLength" value="400" min="100" max="5000" step="100">
    </div>

    <button id="saveBtn">Lưu cài đặt</button>
    <div id="status" class="status"></div>

    <div class="links">
      <a href="https://console.groq.com/keys" target="_blank" id="linkGroq">
        Lấy Groq API Key miễn phí (14,400 req/ngày)
      </a>
      <a href="https://aistudio.google.com/apikey" target="_blank" id="linkGemini" style="display:none">
        Lấy Gemini API Key miễn phí
      </a>
    </div>
  </div>
  <script src="popup.js"></script>
</body>
</html>
