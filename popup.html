<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <div class="popup">
    <div class="header">
      <span class="logo">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#a855f7" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/>
          <polyline points="14 2 14 8 20 8"/>
          <line x1="16" y1="13" x2="8" y2="13"/>
          <line x1="16" y1="17" x2="8" y2="17"/>
        </svg>
      </span>
      <h1>Social Post Summarizer</h1>
    </div>
    <p class="author">by Lê Ẩn</p>

    <!-- Tabs -->
    <div class="tabs">
      <button class="tab active" data-tab="settings">Cài đặt</button>
      <button class="tab" data-tab="history">Lịch sử</button>
    </div>

    <!-- Settings Tab -->
    <div class="tab-content active" id="tab-settings">
      <div class="field">
        <label for="provider">Dịch vụ AI</label>
        <select id="provider">
          <option value="groq">Groq — Llama 3.3 70B (khuyên dùng)</option>
          <option value="gemini">Google Gemini 2.0 Flash</option>
        </select>
      </div>

      <div class="field">
        <label for="apiKey">API Key</label>
        <div class="input-group">
          <input type="password" id="apiKey" placeholder="Nhập API key">
          <button type="button" id="toggleKey" class="icon-btn" title="Hiện/ẩn">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
          </button>
        </div>
      </div>

      <div class="field">
        <label for="outputLang">Ngôn ngữ tóm tắt</label>
        <select id="outputLang">
          <option value="auto">Tự động (Việt nếu bài tiếng Anh)</option>
          <option value="vi">Luôn tiếng Việt</option>
          <option value="en">Luôn tiếng Anh</option>
        </select>
      </div>

      <div class="field">
        <label for="minLength">Độ dài tối thiểu (ký tự)</label>
        <input type="number" id="minLength" value="400" min="100" max="5000" step="100">
      </div>

      <div class="field">
        <label for="customPrompt">Tùy chỉnh prompt (để trống = mặc định)</label>
        <textarea id="customPrompt" rows="3" placeholder="VD: Tóm tắt trong 1 câu ngắn gọn..."></textarea>
      </div>

      <button id="saveBtn">Lưu cài đặt</button>
      <button id="testBtn" class="test-btn">Test kết nối</button>
      <div id="status" class="status"></div>

      <div class="links">
        <a href="https://console.groq.com/keys" target="_blank" id="linkGroq">Lấy Groq API Key miễn phí</a>
        <a href="https://aistudio.google.com/apikey" target="_blank" id="linkGemini" style="display:none">Lấy Gemini API Key miễn phí</a>
      </div>
    </div>

    <!-- History Tab -->
    <div class="tab-content" id="tab-history">
      <div id="historyList" class="history-list"></div>
      <button id="exportBtn" class="test-btn">Export JSON</button>
      <button id="clearBtn" class="test-btn" style="margin-top:4px;color:#ff6b6b">Xóa lịch sử</button>
    </div>
  </div>
  <script src="popup.js"></script>
</body>
</html>
